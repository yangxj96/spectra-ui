<svg width="520" height="150" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient y2="0%" x2="100%" y1="0%" x1="0%" id="redData">
            <stop stop-color="#ff6b6b" offset="0%"/>
            <stop stop-color="#ff8e8e" offset="100%"/>
        </linearGradient>
        <linearGradient y2="0%" x2="100%" y1="0%" x1="0%" id="greenData">
            <stop stop-color="#4ecdc4" offset="0%"/>
            <stop stop-color="#7ee8e1" offset="100%"/>
